# Helm values for Kyverno (kind-friendly)
replicaCount: 1

resources:
  limits:
    memory: 384Mi
    cpu: 300m
  requests:
    memory: 128Mi
    cpu: 100m

# Reduce resource usage for local development
backgroundController:
  resources:
    limits:
      memory: 128Mi
      cpu: 100m
    requests:
      memory: 64Mi
      cpu: 50m

cleanupController:
  resources:
    limits:
      memory: 128Mi
      cpu: 100m
    requests:
      memory: 64Mi
      cpu: 50m

reportsController:
  resources:
    limits:
      memory: 128Mi
      cpu: 100m
    requests:
      memory: 64Mi
      cpu: 50m
