apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-agent-ingress
  namespace: ai-agent
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/rate-limit: "average=10,burst=20"
spec:
  ingressClassName: traefik
  rules:
    - host: ai-agent.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-agent
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-agent
                port:
                  number: 8000
