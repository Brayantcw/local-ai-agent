apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ai-agent-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  ai-agent-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "LLM Requests per Minute",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "rate(llm_requests_total[1m])", "legendFormat": "{{model}} - {{status}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "title": "LLM Response Duration (p50, p95, p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(llm_request_duration_seconds_bucket[5m]))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m]))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, rate(llm_request_duration_seconds_bucket[5m]))", "legendFormat": "p99"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "Input Tokens (rate/min)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{"expr": "rate(llm_tokens_input_total[5m]) * 60", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 1000}, {"color": "red", "value": 5000}]}}}
        },
        {
          "title": "Output Tokens (rate/min)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{"expr": "rate(llm_tokens_output_total[5m]) * 60", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 500}, {"color": "red", "value": 2000}]}}}
        },
        {
          "title": "Total Input Tokens",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [{"expr": "sum by (model) (llm_tokens_input_total)", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Total Output Tokens",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [{"expr": "sum by (model) (llm_tokens_output_total)", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "rate(llm_errors_total[5m])", "legendFormat": "{{model}} errors/s"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "red"}}}
        },
        {
          "title": "Tokens per Request (avg)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {"expr": "rate(llm_tokens_input_total[5m]) / rate(llm_requests_total{status=\"success\"}[5m])", "legendFormat": "avg input tokens/req"},
            {"expr": "rate(llm_tokens_output_total[5m]) / rate(llm_requests_total{status=\"success\"}[5m])", "legendFormat": "avg output tokens/req"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "HTTP Request Rate (FastAPI)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{"expr": "rate(http_requests_total[1m])", "legendFormat": "{{method}} {{handler}} {{status}}"}]
        },
        {
          "title": "HTTP Latency (FastAPI p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))", "legendFormat": "{{handler}} p95"}],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "Context Window Usage (%)",
          "type": "gauge",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 28},
          "targets": [{"expr": "max by (model) (llm_context_usage_ratio) * 100", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 50}, {"color": "red", "value": 80}]}}}
        },
        {
          "title": "Context Tokens Used (last request)",
          "type": "stat",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 28},
          "targets": [{"expr": "max by (model) (llm_context_tokens_used)", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Context Window Size",
          "type": "stat",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 28},
          "targets": [{"expr": "max by (model) (llm_context_window_size)", "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Ollama Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 34},
          "targets": [
            {"expr": "container_memory_usage_bytes{namespace=\"llm-serving\", container=\"ollama\"}", "legendFormat": "used"},
            {"expr": "container_memory_working_set_bytes{namespace=\"llm-serving\", container=\"ollama\"}", "legendFormat": "working set"},
            {"expr": "kube_pod_container_resource_limits{namespace=\"llm-serving\", container=\"ollama\", resource=\"memory\"}", "legendFormat": "limit"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "title": "Ollama CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 34},
          "targets": [
            {"expr": "rate(container_cpu_usage_seconds_total{namespace=\"llm-serving\", container=\"ollama\"}[5m])", "legendFormat": "cpu cores used"},
            {"expr": "kube_pod_container_resource_limits{namespace=\"llm-serving\", container=\"ollama\", resource=\"cpu\"}", "legendFormat": "limit"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Agent Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 42},
          "targets": [
            {"expr": "container_memory_usage_bytes{namespace=\"ai-agent\", container=\"ai-agent\"}", "legendFormat": "used"},
            {"expr": "container_memory_working_set_bytes{namespace=\"ai-agent\", container=\"ai-agent\"}", "legendFormat": "working set"},
            {"expr": "kube_pod_container_resource_limits{namespace=\"ai-agent\", container=\"ai-agent\", resource=\"memory\"}", "legendFormat": "limit"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "title": "Tokens/Second (throughput)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 42},
          "targets": [
            {"expr": "rate(llm_tokens_output_total[5m])", "legendFormat": "output tokens/s"},
            {"expr": "rate(llm_tokens_input_total[5m])", "legendFormat": "input tokens/s"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["ai-agent", "llm", "kubernetes"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "AI Agent - LLM Metrics",
      "uid": "ai-agent-llm-metrics"
    }
