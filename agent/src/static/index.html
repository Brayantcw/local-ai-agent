<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 { font-size: 1.2rem; color: #4ecca3; }
        header .model-badge {
            background: #0f3460;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #4ecca3;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 75%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #eee;
        }
        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .message .meta {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.5rem;
        }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { margin: 0.5rem 0 0.3rem; color: #4ecca3; }
        .message.assistant h1 { font-size: 1.1rem; }
        .message.assistant h2 { font-size: 1rem; }
        .message.assistant h3 { font-size: 0.9rem; }
        .message.assistant p { margin: 0.3rem 0; }
        .message.assistant ul, .message.assistant ol { margin: 0.3rem 0 0.3rem 1.5rem; }
        .message.assistant li { margin: 0.2rem 0; }
        .message.assistant code { background: #0f3460; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        .message.assistant pre { background: #0f3460; padding: 0.8rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
        .message.assistant pre code { background: none; padding: 0; }
        .message.assistant strong { color: #4ecca3; }
        .message.assistant blockquote { border-left: 3px solid #4ecca3; padding-left: 0.8rem; margin: 0.3rem 0; color: #aaa; }
        #input-area {
            padding: 1rem 2rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
        }
        #message-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }
        #message-input:focus { border-color: #4ecca3; }
        #send-btn {
            padding: 0.8rem 1.5rem;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        #send-btn:hover { background: #3ba88a; }
        #send-btn:disabled { background: #555; cursor: not-allowed; }
        .typing-indicator {
            align-self: flex-start;
            padding: 0.8rem 1.2rem;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 AI Agent</h1>
        <span class="model-badge" id="model-name">loading...</span>
        <span class="model-badge">Kubernetes</span>
        <button id="new-chat-btn" style="margin-left:auto; padding:0.4rem 1rem; background:#e94560; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem;">New Chat</button>
    </header>

    <div id="chat-container">
        <div class="message assistant">
            Hello! I'm an AI agent running on Kubernetes. How can I help you?
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const modelName = document.getElementById('model-name');
        const newChatBtn = document.getElementById('new-chat-btn');

        let conversationId = null;

        // Load model info
        fetch('/api/v1/models')
            .then(r => r.json())
            .then(data => { modelName.textContent = data.default; })
            .catch(() => { modelName.textContent = 'unknown'; });

        function renderMarkdown(text) {
            try { return marked.parse(text); } catch { return text; }
        }

        function addMessage(text, role, meta = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(text);
            } else {
                div.textContent = text;
            }
            if (meta) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta';
                metaDiv.textContent = meta;
                div.appendChild(metaDiv);
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing';
            div.textContent = 'Thinking...';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const resp = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, conversation_id: conversationId }),
                });
                const data = await resp.json();
                hideTyping();

                if (resp.ok) {
                    conversationId = data.conversation_id;
                    const meta = `${data.input_tokens} in / ${data.output_tokens} out · ${data.duration_seconds}s · ${data.model}`;
                    addMessage(data.response, 'assistant', meta);
                } else {
                    addMessage('Error: ' + (data.detail || 'Something went wrong'), 'assistant');
                }
            } catch (err) {
                hideTyping();
                addMessage('Error: Could not reach the agent', 'assistant');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        newChatBtn.addEventListener('click', () => {
            conversationId = null;
            chatContainer.innerHTML = '<div class="message assistant">Hello! I\'m an AI agent running on Kubernetes. How can I help you?</div>';
            messageInput.focus();
        });

        messageInput.focus();
    </script>
</body>
</html>
