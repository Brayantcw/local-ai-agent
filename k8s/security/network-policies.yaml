# Deny all ingress/egress by default in ai-agent namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-agent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ai-agent to talk to ollama
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-to-ollama
  namespace: ai-agent
spec:
  podSelector:
    matchLabels:
      app: ai-agent
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llm-serving
          podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow ingress from Traefik ingress controller to ai-agent
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-agent
  namespace: ai-agent
spec:
  podSelector:
    matchLabels:
      app: ai-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8000
---
# Deny all in llm-serving namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: llm-serving
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ollama to receive traffic from ai-agent namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-to-ollama
  namespace: llm-serving
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-agent
          podSelector:
            matchLabels:
              app: ai-agent
      ports:
        - protocol: TCP
          port: 11434
---
# Allow ollama egress for DNS and HTTPS (needed to pull models)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-egress
  namespace: llm-serving
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS for model downloads (ollama.com registry)
    - ports:
        - protocol: TCP
          port: 443
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
