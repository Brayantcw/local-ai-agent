apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-agent
  namespace: ai-agent
  labels:
    release: kube-prometheus
spec:
  selector:
    matchLabels:
      app: ai-agent
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - ai-agent
