# kind cluster configuration — 3 nodes (1 control-plane + 2 workers)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ai-agent-cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Traefik HTTP (NodePort 30080 → localhost:80)
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # Traefik HTTPS (NodePort 30443 → localhost:443)
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
